<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KAI - Asistente IA con Rostro 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Canvas 3D ocupa toda la pantalla (fondo) */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Interfaz de chat flotante */
        .chat-container {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            max-width: 450px;
            background: rgba(10, 20, 30, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            z-index: 100;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .chat-header {
            background: rgba(0, 50, 80, 0.8);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
        }

        .chat-header h3 {
            color: cyan;
            margin: 0;
            font-family: monospace;
        }

        .chat-header span {
            color: cyan;
            font-size: 20px;
        }

        .chat-messages {
            height: 350px;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.4;
            font-family: 'Segoe UI', sans-serif;
        }

        .user-message {
            background: linear-gradient(135deg, #00aaff, #0066cc);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .assistant-message {
            background: rgba(30, 40, 60, 0.9);
            color: #ccffff;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            border-left: 3px solid cyan;
        }

        .chat-input-area {
            display: flex;
            padding: 15px;
            gap: 10px;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }

        .chat-input-area input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 30px;
            padding: 12px 18px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .chat-input-area input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .chat-input-area button {
            background: linear-gradient(135deg, #00aaff, #0066cc);
            border: none;
            border-radius: 30px;
            padding: 12px 24px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .chat-input-area button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px cyan;
        }

        .status-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 8px 18px;
            border-radius: 30px;
            color: cyan;
            font-family: monospace;
            font-size: 12px;
            z-index: 100;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        /* Botón minimizar */
        .minimize-btn {
            background: none;
            border: none;
            color: cyan;
            font-size: 20px;
            cursor: pointer;
            padding: 0 8px;
        }

        /* Scrollbar */
        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: cyan;
            border-radius: 10px;
        }

        @media (max-width: 600px) {
            .chat-container { max-width: calc(100% - 40px); left: 20px; right: 20px; }
            .chat-messages { height: 280px; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="status-indicator" id="status">🌀 KAI ESPERANDO</div>

    <div class="chat-container" id="chat-container">
        <div class="chat-header" id="chat-header">
            <h3>🧠 KAI - Asistente IA</h3>
            <span id="minimize-btn" class="minimize-btn">−</span>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="message assistant-message">
                🧠 <strong>¡Bienvenido a KAI!</strong><br><br>
                Soy un asistente técnico con <strong>rostro 3D y labios sincronizados</strong>.<br><br>
                Pregúntame sobre:<br>
                • Programación y código<br>
                • Redes neuronales<br>
                • Inteligencia artificial<br>
                • Desarrollo de software
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Escribe tu mensaje aquí..." autocomplete="off">
            <button id="send-btn">✨ ENVIAR</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        
        // ========== CONFIGURACIÓN 3D ==========
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.006);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0.15, 4.5);
        camera.lookAt(0, -0.1, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);
        
        // LUCES
        const ambient = new THREE.AmbientLight(0x112244);
        scene.add(ambient);
        const mainLight = new THREE.DirectionalLight(0xaaccff, 1);
        mainLight.position.set(2, 3, 4);
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x4488ff, 0.5);
        fillLight.position.set(-1, 0, 2);
        scene.add(fillLight);
        const rimLight = new THREE.PointLight(0x44aaff, 0.6);
        rimLight.position.set(0, 0.5, -2);
        scene.add(rimLight);
        
        // PARTÍCULAS DE FONDO
        const particleCountBg = 1500;
        const bgGeo = new THREE.BufferGeometry();
        const bgPos = [];
        for (let i = 0; i < particleCountBg; i++) {
            bgPos.push((Math.random()-0.5)*18, (Math.random()-0.5)*12, (Math.random()-0.5)*15-5);
        }
        bgGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(bgPos), 3));
        const bgParticles = new THREE.Points(bgGeo, new THREE.PointsMaterial({ color: 0x44aaff, size: 0.018, transparent: true, opacity: 0.3 }));
        scene.add(bgParticles);
        
        // === ROSTRO ===
        const faceGroup = new THREE.Group();
        let isSpeaking = false;
        let currentMouthOpen = 0.04;
        let targetMouthOpen = 0.04;
        
        function generateBaseFace() {
            const points = [];
            for (let i = 0; i < 1800; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.sqrt(Math.random()) * 0.92;
                let x = Math.cos(angle) * radius * 0.68;
                let y = Math.sin(angle) * radius * 0.88 + 0.08;
                if (y > 0.35) y += 0.04;
                if (y < -0.25) y -= 0.03;
                const z = (Math.random() - 0.5) * 0.22 + 0.08;
                points.push(new THREE.Vector3(x, y, z));
            }
            
            const eyePositions = [
                { x: -0.29, y: 0.27, zBase: 0.22 },
                { x: 0.29, y: 0.27, zBase: 0.22 }
            ];
            eyePositions.forEach(eye => {
                for (let i = 0; i < 200; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const rad = 0.08 + Math.random() * 0.04;
                    const x = eye.x + Math.cos(angle) * rad;
                    const y = eye.y + Math.sin(angle) * rad * 0.7;
                    const z = eye.zBase + (Math.random() - 0.5) * 0.03;
                    points.push(new THREE.Vector3(x, y, z));
                }
                for (let i = 0; i < 130; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const rad = 0.045 + Math.random() * 0.025;
                    const x = eye.x + Math.cos(angle) * rad;
                    const y = eye.y + Math.sin(angle) * rad * 0.7;
                    const z = eye.zBase + 0.03 + (Math.random() - 0.5) * 0.02;
                    points.push(new THREE.Vector3(x, y, z));
                }
                for (let i = 0; i < 40; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const rad = 0.018 + Math.random() * 0.012;
                    const x = eye.x + Math.cos(angle) * rad * 0.5;
                    const y = eye.y + Math.sin(angle) * rad * 0.5 - 0.005;
                    const z = eye.zBase + 0.05;
                    points.push(new THREE.Vector3(x, y, z));
                }
            });
            
            for (let i = 0; i < 200; i++) {
                const t = Math.random();
                const x = (Math.random() - 0.5) * 0.09;
                const y = 0.05 + t * 0.25;
                const z = 0.21 + t * 0.09;
                points.push(new THREE.Vector3(x, y, z));
            }
            for (let i = 0; i < 120; i++) {
                const angle = Math.random() * Math.PI * 2;
                const rad = 0.045 + Math.random() * 0.025;
                const x = (Math.random() - 0.5) * 0.1;
                const y = -0.02 + Math.sin(angle) * rad * 0.6;
                const z = 0.32 + Math.cos(angle) * rad * 0.5;
                points.push(new THREE.Vector3(x, y, z));
            }
            
            const browPositions = [
                { x: -0.33, y: 0.43, len: 0.18 },
                { x: 0.33, y: 0.43, len: 0.18 }
            ];
            browPositions.forEach(brow => {
                for (let i = 0; i < 130; i++) {
                    const t = Math.random();
                    const x = brow.x - brow.len/2 + t * brow.len;
                    const y = brow.y + (Math.sin(t * Math.PI) * 0.025) + (Math.random() - 0.5) * 0.01;
                    const z = 0.18 + Math.random() * 0.04;
                    points.push(new THREE.Vector3(x, y, z));
                }
            });
            
            for (let i = 0; i < 280; i++) {
                const side = Math.random() > 0.5 ? -0.42 : 0.42;
                const x = side + (Math.random() - 0.5) * 0.12;
                const y = 0.02 + Math.random() * 0.14;
                const z = 0.12 + Math.random() * 0.1;
                points.push(new THREE.Vector3(x, y, z));
            }
            
            for (let i = 0; i < 160; i++) {
                const angle = Math.random() * Math.PI * 2;
                const rad = 0.12 + Math.random() * 0.06;
                const x = Math.cos(angle) * rad * 0.6;
                const y = -0.32 + Math.sin(angle) * rad * 0.5;
                const z = 0.1 + Math.random() * 0.08;
                points.push(new THREE.Vector3(x, y, z));
            }
            
            for (let i = 0; i < 220; i++) {
                const x = (Math.random() - 0.5) * 0.6;
                const y = 0.48 + Math.random() * 0.12;
                const z = 0.08 + Math.random() * 0.1;
                points.push(new THREE.Vector3(x, y, z));
            }
            
            // CUELLO
            for (let i = 0; i < 400; i++) {
                const angle = Math.random() * Math.PI * 2;
                const rad = 0.32 + Math.random() * 0.08;
                const x = Math.cos(angle) * rad;
                const y = -0.52 + Math.random() * 0.28;
                const z = 0.05 + (Math.random() - 0.5) * 0.12;
                points.push(new THREE.Vector3(x, y, z));
            }
            for (let i = 0; i < 300; i++) {
                const angle = Math.random() * Math.PI * 2;
                const rad = 0.34 + Math.random() * 0.08;
                const x = Math.cos(angle) * rad;
                const y = -0.50 + Math.random() * 0.30;
                const z = -0.25 + (Math.random() - 0.5) * 0.15;
                points.push(new THREE.Vector3(x, y, z));
            }
            
            const geom = new THREE.BufferGeometry();
            const vertices = points.flatMap(v => [v.x, v.y, v.z]);
            geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
            const pointMat = new THREE.PointsMaterial({ color: 0x44ccff, size: 0.0075, transparent: true, opacity: 0.9 });
            const pointCloud = new THREE.Points(geom, pointMat);
            
            while(faceGroup.children.length > 0) faceGroup.remove(faceGroup.children[0]);
            faceGroup.add(pointCloud);
        }
        
        function generateMouth(openAmount) {
            const points = [];
            const mouthY = -0.12;
            const mouthOpenVal = openAmount * 0.3;
            
            for (let i = 0; i < 120; i++) {
                const angle = Math.random() * Math.PI;
                const rad = 0.18 + Math.random() * 0.04;
                const x = Math.cos(angle) * rad * 0.9;
                const y = mouthY + Math.sin(angle) * 0.035 + (Math.random() - 0.5) * 0.01;
                const z = 0.24 + (1 - Math.abs(x) / 0.2) * 0.03;
                points.push(new THREE.Vector3(x, y, z));
            }
            
            for (let i = 0; i < 120; i++) {
                const angle = Math.random() * Math.PI;
                const rad = 0.18 + Math.random() * 0.04;
                const x = Math.cos(angle) * rad * 0.9;
                const y = mouthY - 0.03 - mouthOpenVal + Math.sin(angle) * 0.03 + (Math.random() - 0.5) * 0.015;
                const z = 0.23 + (1 - Math.abs(x) / 0.2) * 0.025;
                points.push(new THREE.Vector3(x, y, z));
            }
            
            for (let i = 0; i < 30; i++) {
                const x = (Math.random() > 0.5 ? -0.21 : 0.21) + (Math.random() - 0.5) * 0.04;
                const y = mouthY - 0.01 + (Math.random() - 0.5) * 0.03;
                const z = 0.22 + Math.random() * 0.04;
                points.push(new THREE.Vector3(x, y, z));
            }
            
            const geom = new THREE.BufferGeometry();
            const vertices = points.flatMap(v => [v.x, v.y, v.z]);
            geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
            const pointMat = new THREE.PointsMaterial({ color: 0x66ddff, size: 0.008, transparent: true, opacity: 0.95 });
            return new THREE.Points(geom, pointMat);
        }
        
        generateBaseFace();
        faceGroup.position.set(0, 0, 0);
        scene.add(faceGroup);
        
        let currentMouth = null;
        function updateMouth(openAmount) {
            if (currentMouth) faceGroup.remove(currentMouth);
            currentMouth = generateMouth(openAmount);
            faceGroup.add(currentMouth);
        }
        
        // Animación de labios
        let lipSyncInterval = null;
        let startTime = 0;
        let duration = 0;
        
        function startLipSync(text) {
            if (lipSyncInterval) clearInterval(lipSyncInterval);
            const wordCount = text.split(' ').length;
            duration = Math.max(1500, wordCount * 250);
            startTime = Date.now();
            
            lipSyncInterval = setInterval(() => {
                if (!isSpeaking) {
                    if (lipSyncInterval) clearInterval(lipSyncInterval);
                    targetMouthOpen = 0.04;
                    return;
                }
                const elapsed = Date.now() - startTime;
                const progress = Math.min(1, elapsed / duration);
                if (progress < 0.95) {
                    const t = (elapsed % 180) / 180;
                    const syllableIntensity = Math.sin(t * Math.PI);
                    targetMouthOpen = 0.12 + syllableIntensity * 0.22;
                } else {
                    targetMouthOpen = 0.04;
                }
            }, 35);
        }
        
        function stopLipSync() {
            if (lipSyncInterval) {
                clearInterval(lipSyncInterval);
                lipSyncInterval = null;
            }
            targetMouthOpen = 0.04;
        }
        
        setInterval(() => {
            currentMouthOpen = currentMouthOpen * 0.7 + targetMouthOpen * 0.3;
            updateMouth(currentMouthOpen);
        }, 30);
        
        // Mostrar/ocultar rostro
        function setFaceVisible(visible) {
            faceGroup.visible = visible;
            document.getElementById('status').innerHTML = visible ? "🗣️ KAI HABLA | LABIOS SINCRONIZADOS" : "🌀 KAI ESPERANDO";
        }
        
        // ========== VOZ Y ASISTENTE ==========
        let synth = window.speechSynthesis;
        let currentUtterance = null;
        
        // API Key de DeepSeek (debes poner la tuya)
        const DEEPSEEK_API_KEY = "sk-75042d03f603479695dcfc8caa1a6f54"; // <-- COLOCA TU API KEY
        
        async function getAIResponse(userMessage) {
            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [
                            {
                                role: 'system',
                                content: 'Eres Kai, un asistente técnico especializado en programación, redes neuronales, inteligencia artificial y desarrollo de software. No respondes preguntas personales, cotidianas o no técnicas. Si te preguntan sobre temas no relacionados con tecnología, programación o IA, responde: "Soy un asistente técnico especializado en programación e inteligencia artificial. ¿En qué puedo ayudarte con código, redes neuronales o desarrollo?"'
                            },
                            { role: 'user', content: userMessage }
                        ],
                        temperature: 0.7
                    })
                });
                
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                console.error('Error:', error);
                return `Error técnico: ${error.message}`;
            }
        }
        
        async function speak(text) {
            if (currentUtterance) {
                synth.cancel();
                stopLipSync();
            }
            
            isSpeaking = true;
            setFaceVisible(true);
            startLipSync(text);
            
            const cleanText = text.replace(/\.\.\./g, ". ");
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'es-ES';
            utterance.rate = 0.85;
            utterance.pitch = 1.0;
            
            utterance.onend = () => {
                isSpeaking = false;
                stopLipSync();
                setTimeout(() => {
                    if (!isSpeaking) setFaceVisible(false);
                }, 400);
            };
            
            utterance.onerror = () => {
                isSpeaking = false;
                stopLipSync();
                setFaceVisible(false);
            };
            
            synth.speak(utterance);
            currentUtterance = utterance;
        }
        
        // ========== CHAT UI ==========
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        
        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role === 'user' ? 'user-message' : 'assistant-message'}`;
            messageDiv.innerHTML = content.replace(/\n/g, '<br>');
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            addMessage('user', message);
            userInput.value = '';
            
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = "🤔 KAI ESTÁ PENSANDO...";
            
            const response = await getAIResponse(message);
            
            addMessage('assistant', response);
            await speak(response);
        }
        
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // Minimizar chat
        let chatMinimized = false;
        const chatContainer = document.getElementById('chat-container');
        const minimizeBtn = document.getElementById('minimize-btn');
        const chatMessagesDiv = document.getElementById('chat-messages');
        const chatInputArea = document.querySelector('.chat-input-area');
        
        minimizeBtn.addEventListener('click', () => {
            chatMinimized = !chatMinimized;
            if (chatMinimized) {
                chatMessagesDiv.style.display = 'none';
                chatInputArea.style.display = 'none';
                minimizeBtn.textContent = '+';
                chatContainer.style.maxWidth = '250px';
            } else {
                chatMessagesDiv.style.display = 'flex';
                chatInputArea.style.display = 'flex';
                minimizeBtn.textContent = '−';
                chatContainer.style.maxWidth = '450px';
            }
        });
        
        // ANIMACIÓN 3D
        let time = 0;
        function animateScene() {
            requestAnimationFrame(animateScene);
            time += 0.005;
            faceGroup.rotation.y = Math.sin(time * 0.3) * 0.2;
            faceGroup.rotation.x = Math.sin(time * 0.2) * 0.1;
            bgParticles.rotation.y += 0.0005;
            renderer.render(scene, camera);
        }
        animateScene();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Inicialización
        updateMouth(0.04);
        setFaceVisible(false);
        
        console.log('KAI iniciado - Rostro con labios sincronizados');
    </script>
</body>
</html>
